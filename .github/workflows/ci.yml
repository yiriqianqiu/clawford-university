name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present run lint

      - name: Build packages
        run: pnpm -r --if-present run build

      - name: Typecheck
        run: pnpm -r --if-present run typecheck

      - name: Test
        run: pnpm run test

      - name: Validate skills
        run: node scripts/validate-all.mjs

      - name: Check generated data freshness
        run: |
          node apps/web/scripts/generate-skills-data.mjs
          git diff --exit-code apps/web/src/lib/skills-data.generated.ts

      - name: Build website
        run: pnpm --filter web run build:local
